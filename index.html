<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DARK LUA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
  text-align: center;
}

h1 {
  color: #00ff88;
  margin-top: 40px;
}

.box {
  background: #111a2b;
  margin: 30px auto;
  padding: 20px;
  width: 90%;
  max-width: 400px;
  border-radius: 15px;
}

select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #1c2a3f;
  color: white;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  color: white;
  background: linear-gradient(to right, red, orange);
}

#result {
  margin-top: 20px;
  font-weight: bold;
}

</style>
</head>

<body>

<h1>DARK LUA</h1>

<div class="box">
  <h2>🔑 Generate Key</h2>

  <select id="game">
    <option value="mlbb">Mobile Legends</option>
    <option value="codm">CODM</option>
  </select>

  <button onclick="getKey()">Generate Key</button>

  <div id="result">Ready to generate ✅</div>
</div>

<script>

// 🔥 PALITAN MO ITO KUNG MAY IBANG PASTEBIN KA
const pasteLinks = {
  mlbb: "https://api.allorigins.win/raw?url=https://pastebin.com/raw/6mLPUS3z",
  codm: "https://api.allorigins.win/raw?url=https://pastebin.com/raw/6mLPUS3z"
};

// 🔥 GPLink mo
const gplink = "https://gplinks.co/uFLIitrq";

// 👉 CLICK BUTTON
function getKey() {
  document.getElementById("result").innerText = "Redirecting... ⏳";
  window.location.href = gplink;
}

// 👉 PAG GALING SA GPLINK
window.onload = function() {
  const params = new URLSearchParams(window.location.search);

  if (params.get("getkey") === "true") {
    generateKeyDirect();
  }
};

// 👉 FETCH KEY
async function generateKeyDirect() {
  const result = document.getElementById("result");
  const game = document.getElementById("game").value;

  result.innerText = "Loading key... ⚡";

  try {
    const res = await fetch(pasteLinks[game]);
    const text = await res.text();

    const keys = text.split("\n").filter(k => k.trim() !== "");

    if (keys.length === 0) {
      result.innerText = "No keys found ❌";
      return;
    }

    const key = keys[Math.floor(Math.random() * keys.length)];

    result.innerText = "Your Key: " + key;

  } catch (err) {
    result.innerText = "Error fetching keys ❌";
  }
}

</script>

</body>
</html>
